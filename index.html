<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Rescue</title>
    <link rel="icon" type="image/png" href="img/Water-drop-rescue-favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <p class="brand-label">charity: water</p>
        <h1 class="game-title">Water Drop Rescue</h1>
        <p class="game-tagline">Catch clean drops, dodge polluted ones, and keep every second working for you.</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer" title="Click to change duration">
                Time: <span id="time">30</span>s
                <select id="duration-select" aria-label="Game duration">
                    <option value="15">15 seconds</option>
                    <option value="30" selected>30 seconds</option>
                    <option value="45">45 seconds</option>
                    <option value="60">60 seconds</option>
                    <option value="75">75 seconds</option>
                    <option value="90">90 seconds</option>
                </select>
            </div>
            <button id="start-btn" type="button">Start Rescue</button>
        </div>
        <p class="controls-hint">Move with Arrow keys or A / D. On touch devices, drag or tap inside the game area.</p>
        
        <div id="game-container">
            <div id="bucket"></div>
        </div>

        <!-- Game Over Modal -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2>GAME OVER</h2>
                <p class="final-score">Final Score: <span id="final-score">0</span></p>
                <p class="game-message">You made a difference!</p>
                <button id="play-again-btn" type="button">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <div id="global-warning-timer" aria-hidden="true">30</div>
    
    <script src="script.js"></script>
</body>
</html>
